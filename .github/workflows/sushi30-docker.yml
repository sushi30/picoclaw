name: 🐳 Build & Push Docker Image (sushi30)

on:
  push:
    branches: ["sushi30"]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Compute short SHA
        id: sha
        shell: bash
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: 🚀 Build and push picoclaw image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: BUILD_TARGET=build
          tags: |
            ${{ env.REGISTRY }}/sushi30/picoclaw:latest
            ${{ env.REGISTRY }}/sushi30/picoclaw:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: 🚀 Build and push picoclaw-whatsapp image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: BUILD_TARGET=build-whatsapp-native-docker
          tags: |
            ${{ env.REGISTRY }}/sushi30/picoclaw-whatsapp:latest
            ${{ env.REGISTRY }}/sushi30/picoclaw-whatsapp:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
